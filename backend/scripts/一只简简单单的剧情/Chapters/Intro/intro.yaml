  text: '钦灵走近一看，发现风雪正专注地调配着一瓶闪着奇异蓝光的药剂。

    桌上散落着各种魔法材料和古籍。

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【厌恶】别打扰我，正在研究能提升智商的高级魔法药水。

    【自信】这可是连大魔导师都难以掌握的秘传配方。

    【鄙视】你这种愚蠢的笨蛋是不会懂的就是了。


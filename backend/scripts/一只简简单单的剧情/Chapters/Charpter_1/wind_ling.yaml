  character: 风雪
  emotion: 认真
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 小摊主放下了手里的热水，从袖口中伸出了自己的小手弯曲示意了两下，要先给占仆费才行。
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 多少钱？
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '虽然是个穷的吃土的学生，但面子是不可以没有的。

    钦灵夸张地拍了拍口袋，高昂的一副“我付得起”的模样。

    '
- type: modify_character
  duration: 1.8
  condition: null
  isFinal: null
  character: 风雪
  emotion: 心动
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '风雪的目光落到了钦灵刚刚在小吃街路过顺手买的，蒸着热气的红豆派上。

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】一个红豆派。
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '......

    钦灵楞了一下。

    她低头看了眼手中寒酸的派，又抬头看了眼这个一本正经的魔法师，忽然觉得有些好笑。

    虽然有点不舍，但钦灵还是把纸袋递了过去。

    '
- type: player

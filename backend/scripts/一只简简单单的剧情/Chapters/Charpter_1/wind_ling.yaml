- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '钦灵不止一次这么想。她摊着身子趴在教室的窗户上，一个小小的占卜摊在那棵老魁树下摇曳着。

    小小的占卜摊里坐着一只小小的蓝发猫耳姑娘。

    她叫风雪，戴着一顶硕大的，“犹抱琵琶半遮面”一般的黑色巫师帽，还有张朴素但像是包粽子一样的斗篷。

    每天轻晃着身子，在铺着深紫色绒布的小桌上打理着看不出材质的占卜牌。

    每次看到那个半旧，发着残光的水晶球，让人由不自主的觉得她是不是从灰姑娘的童话里串戏过来的。

    '

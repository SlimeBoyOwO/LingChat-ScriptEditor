- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '风雪的两只手接过红豆派，吹了吹表层的热气，啪嚓一下咬下了幸福的第一口。

    红豆派的表层被揭开，流出了甜蜜的红豆流心，把旁边的钦灵馋得直摇尾巴。

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 别光顾着吃啊，我的占仆呢！
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '钦灵付钱可不是来看吃播的。

    '

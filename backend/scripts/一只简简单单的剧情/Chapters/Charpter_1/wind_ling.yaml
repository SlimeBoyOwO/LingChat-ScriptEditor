  character: 风雪
  emotion: 惊讶
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '放学的人流洪流中，钦灵独自一人踱步走到摊前，从头到尾打探着这只懒猫。

    作为一只白狼系人族，观察使她们好奇的“猎物”是狼的本性。

    钦灵用手托住下巴，摆出一副像是怎么吃掉这只蓝猫的思考态。

    风雪的脸慢慢从帽檐显现出来，清秀的脸蛋和这古老的小摊怡然产生了一种奇妙的违和感。

    她还是带着一副事不关己的表情...

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】有什么需要占仆的吗？
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '钦灵从来没相信过占仆这种“邪门”玩意。

    与其相信这些奇奇怪怪的玄学，不如打开电视去看天气预报来的实在。

    但占仆倒也不是她的研究课题，真正重要的是看看这位小法师肚子里到底卖的什么药才行。

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 帮我算算下周下不下雨要不要带伞怎么样？
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 钦灵压不住嘴角的笑下意识问出了这句。
- type: modify_character
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  emotion: 惊讶
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 风雪微微抬起了眉毛。
- type: modify_character
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  emotion: 认真
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 但很快便压了下来，恢复到那毫无波澜的平静。
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】这位客人，我的占仆可不便宜，你就想问这种愚蠢的问题？
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 没有成功捉弄猎物的狼尾巴瞬间垂了下来。
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '*“亏什么也不能亏我的钱包啊，还是问个正经点的好了。”*'
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: 钦灵心里嘀咕了两声，最终还是微微鼓着脸随口对小摊主说。
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 好吧好吧，你还是帮我算一下我能不能过计算机考试吧。
- type: modify_character
  duration: 1.0
  condition: null
  isFinal: null
  character: 风雪
  emotion: 认真
- type: modify_character

  effect: Starfield
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '校外的小吃街永远是放学后最热闹的集市，几乎每个人都忍不住在那里买点暖胃的小零食。

    而相衬下那个老旧的魁树和摊位则是一副不谙世事的样子，在犄角旮旯的地方只有攘攘几个人漠然路过。

    那个小摊主也毫不在意自己的生意...

    偶尔端着热水抿两口用余光扫过一眼人间烟火，轻轻打着哈气像是要靠着如此的白噪声入眠一般。

    '

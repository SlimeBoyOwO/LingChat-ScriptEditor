  isFinal: null
  text: '风雪放下了红豆派，珍重的将它放在一旁，擦了擦嘴。

    一如既往娴熟地洗了洗牌，指了指上面的图案，示意着钦灵抽一张。

    不以为然的钦灵随手拿了一个。

    牌面上画着一座高塔，塔顶被闪电击中，一个人从中坠落，毅然一副骇人的惨状。

    '

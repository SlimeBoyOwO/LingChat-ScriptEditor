- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【冷淡】再给你一颗

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '这不是数量的问题啦！

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【惊讶】居然不是哦。

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '今天是万圣节耶，要享受节日氛围啊，节日氛围。

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  text: 【冷淡】我有在好好享受节日氛围来着
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 看不出来……
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】执行独属于万圣节的重要研究
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 那完全就不是万圣节氛围啦，那就是在工作！
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【好奇】但对我来说很有万圣节氛围哦？
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 你个工作笨蛋……
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】夸奖我就收下了
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 总之别窝在里面啦，我来带你享受真正的万圣节氛围
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【冷眼】我的魔法师服都比你有万圣节氛围
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: nonono，重要的是心，是heart
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【认真】我对我的工作很上心的
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '唉，果然居家笨蛋什么不懂

    万圣节的核心，可是糖果！

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【疑惑】我不是甜食笨蛋…

    【盯着】而且我给你的糖果你也还没吃呢

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '啊，光顾着和你说话，忘了这个

    啊嗯…

    ……！！

    呸……！

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: 【厌恶】吃进去的糖果再吐手上可不卫生哦。
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '你给我的这是什么！好难吃！

    好苦！又好咸！还有鱼内脏腐烂的臭味！

    '
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【自信】原来是这种感觉…

    【开心】很有参考价值呢

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: 所以到底是什么啦！
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【认真】北欧咸甘草糖

    【微笑】网上说是最难吃的糖之一，好奇买了，但没敢吃

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '不要拿人家当实验材料啦！

    让我进去洗手！

    '

  isFinal: null
  text: '*一声清脆的关门声...*

    '
- type: player
  duration: 0.0
  condition: null
  isFinal: null
  text: '诶？

    喂，开门哇，你个冷面女！不要给完糖就不管人了！

    而且才给一颗糖，太小气了吧！

    '
- type: narration
  duration: 0.0
  condition: null
  isFinal: null
  text: '门又缓缓的打开了...

    '

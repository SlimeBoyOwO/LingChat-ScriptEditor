  isFinal: null
  text: 糖果不想吃了！至少让我感受一下别的万圣节特色嘛。
- type: dialogue
  duration: 0.0
  condition: null
  isFinal: null
  character: 风雪
  text: '【微微一笑】是吗，我知道了。

